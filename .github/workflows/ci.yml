name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so the app compiles without real secrets.
          # Real values are configured in the hosting provider (e.g. Vercel).
          MONGODB_URI: mongodb://localhost:27017
          NEXTAUTH_SECRET: ci-placeholder-secret
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
